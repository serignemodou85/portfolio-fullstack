<section class="reset-page">
  <div class="reset-wrapper">
    <div class="reset-aside">
      <div class="brand">
        <div class="brand-logo">MF</div>
        <h2>Nouveau mot de passe</h2>
        <p>Definissez un mot de passe fort pour votre compte administrateur.</p>
      </div>
    </div>

    <div class="reset-container">
      <div class="reset-card">
        <div class="reset-header">
          <h1>Reinitialisation</h1>
          <p>Renseignez votre nouveau mot de passe.</p>
        </div>

        <div *ngIf="error" class="alert alert-error">{{ error }}</div>
        <div *ngIf="success" class="alert alert-success">
          Mot de passe modifie avec succes.
        </div>

        <form *ngIf="!success" (ngSubmit)="onSubmit()" #confirmForm="ngForm" novalidate>
          <div class="form-group">
            <label for="newPassword">Nouveau mot de passe</label>
            <input
              id="newPassword"
              name="newPassword"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              [(ngModel)]="newPassword"
              [disabled]="loading"
            />
          </div>

          <div class="form-group">
            <label for="newPassword2">Confirmer le mot de passe</label>
            <input
              id="newPassword2"
              name="newPassword2"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              [(ngModel)]="newPassword2"
              [disabled]="loading"
            />
          </div>

          <button type="submit" class="btn-primary" [disabled]="!confirmForm.valid || loading">
            {{ loading ? 'Validation...' : 'Valider le nouveau mot de passe' }}
          </button>
        </form>

        <button *ngIf="success" type="button" class="btn-primary" (click)="goToLogin()">
          Aller a la connexion
        </button>

        <a routerLink="/admin/login" class="back-link">Retour a la connexion</a>
      </div>
    </div>
  </div>
</section>
