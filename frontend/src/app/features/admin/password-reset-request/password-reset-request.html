<section class="reset-page">
  <div class="reset-wrapper">
    <div class="reset-aside">
      <div class="brand">
        <div class="brand-logo">MF</div>
        <h2>Recuperation admin</h2>
        <p>Entrez votre email pour recevoir un lien de reinitialisation du mot de passe.</p>
      </div>
    </div>

    <div class="reset-container">
      <div class="reset-card">
        <div class="reset-header">
          <h1>Mot de passe oublie</h1>
          <p>Un email de reinitialisation sera envoye si le compte existe.</p>
        </div>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm" novalidate>
          <div *ngIf="error" class="alert alert-error">{{ error }}</div>
          <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

          <div class="form-group">
            <label for="email">Email admin</label>
            <input
              id="email"
              name="email"
              type="email"
              required
              autocomplete="email"
              [(ngModel)]="email"
              [disabled]="loading"
            />
          </div>

          <button type="submit" class="btn-primary" [disabled]="!resetForm.valid || loading">
            {{ loading ? 'Envoi en cours...' : 'Envoyer le lien' }}
          </button>
        </form>

        <a routerLink="/admin/login" class="back-link">Retour a la connexion</a>
      </div>
    </div>
  </div>
</section>
