<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-scroll">
      <div class="brand">
        <span class="brand-dot"></span>
        <div>
          <p class="brand-title">Modou Fall</p>
          <p class="brand-sub">Data & Full-Stack</p>
        </div>
      </div>

      <div class="nav-section">
        <p class="nav-label">Navigation</p>
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-link">
          <app-icon name="chart" [size]="16"></app-icon>
          <span>Dashboard</span>
        </a>
        <a routerLink="/admin/profile" routerLinkActive="active" class="nav-link">
          <app-icon name="user" [size]="16"></app-icon>
          <span>Profil</span>
        </a>
      </div>

      <div class="nav-section">
        <p class="nav-label">Gestion contenu</p>
        <a routerLink="/admin/projects/new" routerLinkActive="active" class="nav-link">
          <app-icon name="file" [size]="16"></app-icon>
          <span>Projets</span>
        </a>
        <a routerLink="/admin/blog" routerLinkActive="active" class="nav-link">
          <app-icon name="edit" [size]="16"></app-icon>
          <span>Blog</span>
        </a>
        <a routerLink="/admin/experiences" routerLinkActive="active" class="nav-link">
          <app-icon name="user" [size]="16"></app-icon>
          <span>Expériences</span>
        </a>
        <a routerLink="/admin/skills" routerLinkActive="active" class="nav-link">
          <app-icon name="settings" [size]="16"></app-icon>
          <span>Compétences</span>
        </a>
        <a routerLink="/admin/projects/archives" routerLinkActive="active" class="nav-link">
          <app-icon name="archive" [size]="16"></app-icon>
          <span>Archives</span>
        </a>
      </div>

      <!-- Préférences : dark mode + langue -->
      <div class="nav-section sidebar-prefs">
        <p class="nav-label">Préférences</p>
        <button class="nav-link pref-btn" type="button" (click)="theme.toggle()">
          <svg *ngIf="theme.isDark" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg *ngIf="!theme.isDark" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <span>{{ theme.isDark ? 'Mode clair' : 'Mode sombre' }}</span>
        </button>
        <button class="nav-link pref-btn" type="button" (click)="langService.toggle()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span>{{ langService.current === 'fr' ? 'English' : 'Français' }}</span>
        </button>
      </div>
    </div>

    <div class="sidebar-footer">
      <!-- Actions : toujours en bas -->
      <div class="nav-section actions-section">
        <p class="nav-label">Actions</p>
        <button class="nav-link logout-btn" type="button" (click)="logout()">
          <app-icon name="arrow-right" [size]="16"></app-icon>
          <span>Déconnexion</span>
        </button>
      </div>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-content">
      <ng-content></ng-content>
    </div>
  </main>
</div>
